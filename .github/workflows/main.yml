name: main
on:
  workflow_dispatch:
  schedule:
    - cron: 1 08 * * *

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v6

      - name: 创建node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: ./api/package-lock.json

      - name: 🔧 安装GitHub CLI，并使用PAT登录
        env:
          PAT: ${{ secrets.PAT }}
        run: |
          if [ -n "${PAT}" ]; then
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
            sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
            sudo apt update
            sudo apt install gh -y
            echo "${{ secrets.PAT }}" | gh auth login --with-token
          fi

      - name: Cache node_modules in api directory
        id: cache-npm
        uses: actions/cache@v5
        with:
          path: ./api/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('./api/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: 安装依赖
        run: npm run install
        if: ${{ steps.cache-npm.outputs.cache-hit != 'true' }}

      # ✅ 关键：保存签到结果
      - name: 签到
        id: checkin
        run: |
          npm run main | tee result.txt
        env:
          USERINFO: ${{ secrets.USERINFO }}
          PAT: ${{ secrets.PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      # ✅ 提取VIP信息
      - name: 提取结果
        id: extract
        run: |
          VIP=$(grep "VIP到期时间" result.txt || echo "未获取到VIP信息")
          echo "vip=$VIP" >> $GITHUB_OUTPUT

      # ✅ 微信通知（Server酱）
      - name: 微信通知
        run: |
          curl -X POST "https://sctapi.ftqq.com/${{ secrets.SCKEY }}.send" \
          -d "title=🎵 酷狗签到结果" \
          -d "desp=签到完成\n${{ steps.extract.outputs.vip }}"
